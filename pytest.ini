[tool:pytest]
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src/app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    scenario1: Tests for menu browsing and dish details
    scenario2: Tests for dietary filtering
    scenario3: Tests for review submission
    scenario4: Tests for report incorrect menu item
    unit: Unit tests
    integration: Integration tests
